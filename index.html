<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion360Immo | Plateforme Collaborative de Gestion Immobilière</title>
    <style>
      /* NUCLEAR HIDER: Empêche l'overlay de Vite/PWA de bloquer l'UI */
      vite-error-overlay, #vite-error-overlay, [id="vite-error-overlay"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <!-- DEFENSE IMMUABLE (BLACKHOLE BROADCAST) -->
    <script>
      (function() {
        // 1. SW Nuker : On vide le cache PWA au chargement pour forcer le nouveau code
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
          });
        }

        var _RealBC = window.BroadcastChannel;
        if (!_RealBC) return;

        // On rend le remplacement immuable (ne peut être écrasé par des extensions)
        try {
          Object.defineProperty(window, 'BroadcastChannel', {
            value: function(name) {
              if (name && (name.indexOf('tabs:') !== -1 || name.indexOf('supabase') !== -1)) {
                console.warn("🛡️ [Endgame] Canal neutralisé :", name);
                return {
                  name: name,
                  onmessage: null,
                  postMessage: function() {},
                  close: function() {},
                  addEventListener: function() {},
                  removeEventListener: function() {}
                };
              }
              return new _RealBC(name);
            },
            writable: false,
            configurable: false
          });
        } catch (e) {
          console.error("⚠️ [Endgame] Échec du verrouillage du canal.");
        }

        // Silencieux universel
        var silencer = function(e) {
          var error = e.error || e.reason || e;
          var msg = (typeof error === 'string' ? error : (error.message || error.stack || "") || "").toLowerCase();
          
          if (msg.indexOf('no listener') !== -1 || msg.indexOf('this.lock') !== -1) {
            if (e.preventDefault) e.preventDefault();
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener('error', silencer, true);
        window.addEventListener('unhandledrejection', silencer, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
