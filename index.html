<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion360Immo | Plateforme Collaborative de Gestion Immobilière</title>
    <!-- DEFENSE NUCLEAIRE (BLACKHOLE BROADCAST) -->
    <script>
      (function() {
        // 1. Remplacement radical de BroadcastChannel pour Supabase
        var _RealBC = window.BroadcastChannel;
        if (_RealBC) {
          window.BroadcastChannel = function(name) {
            // Si c'est un canal interne de Supabase, on le court-circuite
            if (name && (name.indexOf('tabs:') !== -1 || name.indexOf('supabase') !== -1)) {
              console.warn("🛡️ [Blackhole] Canal neutralisé :", name);
              return {
                name: name,
                onmessage: null,
                onmessageerror: null,
                postMessage: function() {}, // On avale le message sans erreur
                close: function() {},
                addEventListener: function() {},
                removeEventListener: function() {}
              };
            }
            return new _RealBC(name);
          };
          window.BroadcastChannel.prototype = _RealBC.prototype;
        }

        // 2. Silencieux universel pour les erreurs persistantes
        var silencer = function(e) {
          var error = e.error || e.reason || e;
          var msg = (typeof error === 'string' ? error : (error.message || error.stack || "")).toLowerCase();
          
          if (msg.indexOf('no listener') !== -1 || msg.indexOf('outgoing.message.ready') !== -1) {
            if (e.preventDefault) e.preventDefault();
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener('error', silencer, true);
        window.addEventListener('unhandledrejection', silencer, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
