<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion360Immo | Plateforme Collaborative de Gestion Immobilière</title>
    <!-- NUKER ANTI-CRASH SUPABASE (MONKEY-PATCH) -->
    <script>
      (function() {
        var _BroadcastChannel = window.BroadcastChannel;
        if (!_BroadcastChannel) return;

        window.BroadcastChannel = function(name) {
          var channel = new _BroadcastChannel(name);
          // Si c'est un canal Supabase (tabs:), on force un écouteur immédiatement
          if (name && name.indexOf('tabs:') !== -1) {
            channel.onmessage = function() {};
            console.warn("🛡️ [Nuker] Protection activée pour le canal :", name);
          }
          return channel;
        };
        window.BroadcastChannel.prototype = _BroadcastChannel.prototype;

        // Silencieux global (backup)
        var silencer = function(e) {
          var msg = (e.message || (e.reason && e.reason.message) || "").toLowerCase();
          if (msg.indexOf('no listener') !== -1 || msg.indexOf('outgoing.message.ready') !== -1) {
            if (e.preventDefault) e.preventDefault();
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener('error', silencer, true);
        window.addEventListener('unhandledrejection', silencer, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
