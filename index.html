<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion360Immo | Plateforme Collaborative de Gestion Immobilière</title>
    <script>
      /* HIGH PRIORITY WATCHDOG: Supprime physiquement les overlays persistants */
      (function() {
        setInterval(function() {
          var overlay = document.querySelector('vite-error-overlay') || 
                        document.querySelector('#vite-error-overlay') || 
                        document.querySelector('[id*="vite-error-overlay"]');
          if (overlay) {
            console.warn("🛡️ [Watchdog] Overlay détecté et supprimé.");
            overlay.remove();
          }
        }, 100);
      })();

      /* HIGH PRIORITY SILENCER: On intercepte TOUT au sommet du head */
      (function() {
        var _dispatchEvent = window.dispatchEvent;
        window.dispatchEvent = function(event) {
          if (event && event.type === 'unhandledrejection') {
            var reason = event.reason || "";
            var msg = (typeof reason === 'string' ? reason : (reason.message || reason.stack || "")).toLowerCase();
            if (msg.indexOf('no listener') !== -1 || msg.indexOf('outgoing.message.ready') !== -1) {
              return false;
            }
          }
          return _dispatchEvent.apply(this, arguments);
        };
      })();
    </script>
    <style>
      /* NUCLEAR HIDER: Masque physiquement l'overlay Vite/PWA */
      vite-error-overlay, #vite-error-overlay, [id="vite-error-overlay"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <!-- DEFENSE IMMUABLE (BLACKHOLE BROADCAST) -->
    <script>
      (function() {
        // SW Nuker : Nettoyage agressif du cache PWA
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
          });
        }

        var _RealBC = window.BroadcastChannel;
        if (!_RealBC) return;

        try {
          Object.defineProperty(window, 'BroadcastChannel', {
            value: function(name) {
              if (name && (name.indexOf('tabs:') !== -1 || name.indexOf('supabase') !== -1)) {
                console.warn("🛡️ [Forteresse] Canal neutralisé :", name);
                return {
                  name: name,
                  onmessage: null,
                  postMessage: function() {},
                  close: function() {},
                  addEventListener: function() {},
                  removeEventListener: function() {}
                };
              }
              return new _RealBC(name);
            },
            writable: false,
            configurable: false
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
